<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: Arial;
        }
        .calculator {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            width: 200px;
            height: 40px;
            margin-bottom: 10px;
            font-size: 20px;
            text-align: right;
        }
        button {
            width: 45px;
            height: 45px;
            margin: 5px;
            font-size: 18px;
  
  
  
  color: #0ff; /* Neon Cyan */
  background: transparent;
  padding: 15px 30px;
  border: 2px solid #0ff;
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  transition: 0.3s;
  
  /* The "Glow" Layering */
  text-shadow: 0 0 8px #0ff;
  box-shadow: 0 0 10px #0ff, inset 0 0 10px #0ff;
}

button:hover {
  background: #0ff;
  color: #000;
  /* Stronger glow on hover */
  box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
}

/* Optional: Subtle Pulse Animation */
@keyframes pulse {
  0% { box-shadow: 0 0 10px #0ff; }
  50% { box-shadow: 0 0 25px #0ff; }
  100% { box-shadow: 0 0 10px #0ff; }
}

.neon-button {
  animation: pulse 2s infinite;
}

}

button:hover {
  transform: translateY(-3px); /* Lifts up */
  box-shadow: 0 10px 15px rgba(0,0,0,0.2); /* Deeper shadow */
  background-color: #7722ff;
}

            
        }
        
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <br>

    <button onclick="add('7')">7</button>
    <button onclick="add('8')">8</button>
    <button onclick="add('9')">9</button>
    <button onclick="add('/')">/</button>

    <br>

    <button onclick="add('4')">4</button>
    <button onclick="add('5')">5</button>
    <button onclick="add('6')">6</button>
    <button onclick="add('*')">*</button>

    <br>

    <button onclick="add('1')">1</button>
    <button onclick="add('2')">2</button>
    <button onclick="add('3')">3</button>
    <button onclick="add('-')">-</button>

    <br>

    <button onclick="add('0')">0</button>
    <button onclick="clearDisplay()">C</button>
    <button onclick="calculate()">=</button>
    <button onclick="add('+')">+</button>
</div>

<script>
    function add(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function calculate() {
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    }
</script>

</body>
</html>
